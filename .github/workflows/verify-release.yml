name: Verify Release (dry-run)
# Same payload staging as publish-maven-central.yml but stops at `mvn verify`.
# Validates that compile + bundle + sources + javadoc + GPG signing all pass
# without actually deploying to Maven Central. Safe to run as many times as
# needed before the real publish.

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Resolve release tag from pom version
        run: |
          VERSION=$(mvn -B -q help:evaluate -Dexpression=project.version -DforceStdout)
          echo "POM_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$VERSION" >> "$GITHUB_ENV"

      - name: Download natives from GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p assets
          # *.so.* / *.dylib for Linux + macOS individual files;
          # *.zip picks up legerix-win-x86-64.zip (full vcpkg DLL set).
          gh release download "$RELEASE_TAG" --dir assets --pattern '*.so.*' --pattern '*.dylib' --pattern '*.zip'
          ls -la assets/

      - name: Stage natives into src/main/resources
        run: |
          mkdir -p src/main/resources/linux-x86-64 \
                   src/main/resources/linux-x86-64-legacy \
                   src/main/resources/linux-aarch64 \
                   src/main/resources/linux-aarch64-legacy \
                   src/main/resources/darwin \
                   src/main/resources/darwin-aarch64 \
                   src/main/resources/win32-x86-64

          cp assets/libtesseract.so.5-linux-x86-64           src/main/resources/linux-x86-64/libtesseract.so.5
          cp assets/libleptonica.so.6-linux-x86-64           src/main/resources/linux-x86-64/libleptonica.so.6
          cp assets/libtesseract.so.5-linux-x86-64-legacy    src/main/resources/linux-x86-64-legacy/libtesseract.so.5
          cp assets/libleptonica.so.6-linux-x86-64-legacy    src/main/resources/linux-x86-64-legacy/libleptonica.so.6
          cp assets/libtesseract.so.5-linux-aarch64          src/main/resources/linux-aarch64/libtesseract.so.5
          cp assets/libleptonica.so.6-linux-aarch64          src/main/resources/linux-aarch64/libleptonica.so.6
          cp assets/libtesseract.so.5-linux-aarch64-legacy   src/main/resources/linux-aarch64-legacy/libtesseract.so.5
          cp assets/libleptonica.so.6-linux-aarch64-legacy   src/main/resources/linux-aarch64-legacy/libleptonica.so.6
          cp assets/libtesseract.5-darwin.dylib              src/main/resources/darwin/libtesseract.5.dylib
          cp assets/libleptonica.6-darwin.dylib              src/main/resources/darwin/libleptonica.6.dylib
          cp assets/libtesseract.5-darwin-aarch64.dylib      src/main/resources/darwin-aarch64/libtesseract.5.dylib
          cp assets/libleptonica.6-darwin-aarch64.dylib      src/main/resources/darwin-aarch64/libleptonica.6.dylib
          # Windows: unzip the full vcpkg DLL bundle into the resource dir.
          unzip -o assets/legerix-win-x86-64.zip -d src/main/resources/win32-x86-64/

      - name: Fetch traineddata (5 bundled languages)
        run: bash ./scripts/fetch-traineddata.sh src/main/resources/tessdata

      - name: Verify staged payload
        run: |
          echo "=== Natives staged ==="
          find src/main/resources -type f \( -name "*.so*" -o -name "*.dylib" -o -name "*.dll" \) | sort
          UNIX_COUNT=$(find src/main/resources -type f \( -name "*.so*" -o -name "*.dylib" \) | wc -l)
          WIN_COUNT=$(find src/main/resources/win32-x86-64 -type f -name "*.dll" | wc -l)
          if [ "$UNIX_COUNT" -ne 12 ]; then
            echo "ERROR: expected 12 Linux+macOS natives, found $UNIX_COUNT"
            exit 1
          fi
          if [ "$WIN_COUNT" -lt 2 ]; then
            echo "ERROR: expected at least 2 Windows DLLs, found $WIN_COUNT"
            exit 1
          fi
          for lang in eng fra spa chi_sim hin; do
            test -f "src/main/resources/tessdata/${lang}.traineddata" \
              || { echo "ERROR: missing tessdata/${lang}.traineddata"; exit 1; }
          done
          echo "OK: 12 Linux/macOS natives + $WIN_COUNT Windows DLLs + 5 traineddata files"

      - name: Maven verify (compile + bundle + sources + javadoc + GPG sign)
        run: mvn -B verify -P release -DskipTests
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Inspect produced JAR
        run: |
          JAR=$(ls target/legerix-*.jar | grep -v sources | grep -v javadoc | head -1)
          echo "=== Inspecting $JAR ==="
          ls -la target/legerix-*.jar target/legerix-*.jar.asc 2>/dev/null || true
          echo "=== Natives + tessdata inside the jar ==="
          unzip -l "$JAR" | grep -E '\.(so|dll|dylib|traineddata)' | sort
          UNIX_PAYLOAD=$(unzip -l "$JAR" | grep -E '/(linux|darwin)[^/]*/[^/]+\.(so\.|dylib)' | wc -l)
          WIN_PAYLOAD=$(unzip -l "$JAR" | grep -E '/win32-x86-64/[^/]+\.dll$' | wc -l)
          TRAINED_PAYLOAD=$(unzip -l "$JAR" | grep -E '/tessdata/[^/]+\.traineddata$' | wc -l)
          echo "Payload: $UNIX_PAYLOAD Linux+macOS natives, $WIN_PAYLOAD Windows DLLs, $TRAINED_PAYLOAD traineddata"
          if [ "$UNIX_PAYLOAD" -ne 12 ] || [ "$WIN_PAYLOAD" -lt 2 ] || [ "$TRAINED_PAYLOAD" -ne 5 ]; then
            echo "ERROR: jar payload mismatch"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: legerix-verify-output
          path: |
            target/legerix-*.jar
            target/legerix-*.jar.asc
            target/legerix-*.pom
            target/legerix-*.pom.asc
          if-no-files-found: error
