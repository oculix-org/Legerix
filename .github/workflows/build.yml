name: Build and Release Legerix
# 7-job matrix: linux x64 modern + legacy, linux aarch64 modern + legacy,
# macOS x64, macOS aarch64, Windows x64. Final job assembles the fat jar
# and attaches the jar + every native to a GitHub Release on tagged builds.
# Maven Central publication is intentionally NOT wired here; use the
# manual "Publish to Maven Central" workflow when the time comes.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  # ----- Linux x86_64 modern (Ubuntu 24.04, glibc >= 2.38) ------------------
  build_linux_x64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Get Version Info
        run: |
          echo "POM_VERSION=$(mvn build-helper:parse-version org.apache.maven.plugins:maven-help-plugin:3.2.0:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV
          echo "TESSERACT_VERSION=$(mvn build-helper:parse-version org.apache.maven.plugins:maven-help-plugin:3.2.0:evaluate -Dexpression=tesseract.version.long -q -DforceStdout)" >> $GITHUB_ENV
          echo "LEPTONICA_VERSION=$(mvn build-helper:parse-version org.apache.maven.plugins:maven-help-plugin:3.2.0:evaluate -Dexpression=leptonica.version -q -DforceStdout)" >> $GITHUB_ENV

      - name: Install build dependencies
        run: |
          sudo apt-get update -q -y
          # libtiff-dev pulls in headers but not all its runtime codec
          # dependencies, so we install them explicitly. Without these,
          # leptonica/tesseract still link against libwebp/libzstd/etc.
          # but the runtime .so files are absent from /usr/lib at bundle
          # time and the verify NEEDED step (correctly) fails.
          sudo apt-get install -q -y \
            build-essential autoconf automake libtool pkg-config \
            libpng-dev libjpeg-dev libtiff-dev zlib1g-dev \
            libwebp-dev libzstd-dev liblzma-dev liblerc-dev libjbig-dev libdeflate-dev \
            curl

      - name: Build leptonica + tesseract
        run: |
          PREFIX="$RUNNER_TEMP/legerix-prefix"
          mkdir -p "$PREFIX"
          ./scripts/build-leptonica.sh "$LEPTONICA_VERSION" "$PREFIX"
          ./scripts/build-tesseract.sh "$TESSERACT_VERSION" "$PREFIX"
          mkdir -p out
          cp -L "$PREFIX/lib/libleptonica.so.6" out/
          cp -L "$PREFIX/lib/libtesseract.so.5" out/

      - name: Bundle transitive codec deps (jpeg, png, tiff, zlib)
        run: |
          # Bundle the system libs leptonica/tesseract linked against, so
          # minimal containers (Ubuntu slim, Alpine, distroless) where these
          # are not preinstalled can still load Legerix natives. RPATH=$ORIGIN
          # set at build time means the loader will find them in the same
          # directory at runtime.
          LIB_DIR="/usr/lib/x86_64-linux-gnu"
          # Core image codec deps (leptonica/tesseract direct deps)
          cp -L "$LIB_DIR"/libjpeg.so.*     out/ 2>/dev/null || true
          cp -L "$LIB_DIR"/libpng16.so.*    out/ 2>/dev/null || true
          cp -L "$LIB_DIR"/libtiff.so.*     out/ 2>/dev/null || true
          cp -L "$LIB_DIR"/libz.so.*        out/ 2>/dev/null || true
          # Transitive deps pulled in by libtiff on modern Ubuntu (webp,
          # zstd, lzma, Lerc, jbig, deflate). Bundling these prevents the
          # same class of "missing libfoo on minimal container" failure
          # one level deeper in the dependency graph.
          cp -L "$LIB_DIR"/libwebp.so.*     out/ 2>/dev/null || true
          cp -L "$LIB_DIR"/libzstd.so.*     out/ 2>/dev/null || true
          cp -L "$LIB_DIR"/liblzma.so.*     out/ 2>/dev/null || true
          cp -L "$LIB_DIR"/libLerc.so.*     out/ 2>/dev/null || true
          cp -L "$LIB_DIR"/libjbig.so.*     out/ 2>/dev/null || true
          cp -L "$LIB_DIR"/libdeflate.so.*  out/ 2>/dev/null || true
          # libsharpyuv is a transitive of libwebp itself (introduced in webp 1.3+)
          cp -L "$LIB_DIR"/libsharpyuv.so.* out/ 2>/dev/null || true
          ls -la out/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86-64
          path: out/

  # ----- Linux x86_64 legacy (manylinux_2_28 container, glibc <= 2.28) ------
  build_linux_x64_legacy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Get Version Info
        run: |
          echo "TESSERACT_VERSION=$(mvn build-helper:parse-version org.apache.maven.plugins:maven-help-plugin:3.2.0:evaluate -Dexpression=tesseract.version.long -q -DforceStdout)" >> $GITHUB_ENV
          echo "LEPTONICA_VERSION=$(mvn build-helper:parse-version org.apache.maven.plugins:maven-help-plugin:3.2.0:evaluate -Dexpression=leptonica.version -q -DforceStdout)" >> $GITHUB_ENV

      - name: Build in manylinux_2_28 (x86_64)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/io -w /io \
            -e TESSERACT_VERSION=${{ env.TESSERACT_VERSION }} \
            -e LEPTONICA_VERSION=${{ env.LEPTONICA_VERSION }} \
            quay.io/pypa/manylinux_2_28_x86_64 \
            /bin/bash -ec '
              yum install -y -q \
                libpng-devel libjpeg-turbo-devel libtiff-devel zlib-devel \
                libwebp-devel libzstd-devel xz-devel libdeflate-devel jbigkit-devel \
                autoconf automake libtool pkgconfig curl
              # libLerc not in CentOS 8 stream repos — libtiff on this
              # platform was built older without LERC support, so it is
              # not referenced as a NEEDED. Same for libsharpyuv (webp 1.3+
              # is too recent for manylinux_2_28 — the bundled webp is older).
              PREFIX=/io/_legacy-prefix
              mkdir -p "$PREFIX"
              ./scripts/build-leptonica.sh "$LEPTONICA_VERSION" "$PREFIX"
              ./scripts/build-tesseract.sh "$TESSERACT_VERSION" "$PREFIX"
              mkdir -p out
              cp -L "$PREFIX/lib/libleptonica.so.6" out/
              cp -L "$PREFIX/lib/libtesseract.so.5" out/
              # Bundle transitive codec deps from the manylinux_2_28 container
              # (CentOS 8 family, libs in /usr/lib64). Same rationale as the
              # modern Linux job: minimal containers do not have these.
              cp -L /usr/lib64/libjpeg.so.*     out/ 2>/dev/null || true
              cp -L /usr/lib64/libpng16.so.*    out/ 2>/dev/null || true
              cp -L /usr/lib64/libtiff.so.*     out/ 2>/dev/null || true
              cp -L /usr/lib64/libz.so.*        out/ 2>/dev/null || true
              # Transitive deps via libtiff on manylinux_2_28
              cp -L /usr/lib64/libwebp.so.*     out/ 2>/dev/null || true
              cp -L /usr/lib64/libzstd.so.*     out/ 2>/dev/null || true
              cp -L /usr/lib64/liblzma.so.*     out/ 2>/dev/null || true
              cp -L /usr/lib64/libLerc.so.*     out/ 2>/dev/null || true
              cp -L /usr/lib64/libjbig.so.*     out/ 2>/dev/null || true
              cp -L /usr/lib64/libdeflate.so.*  out/ 2>/dev/null || true
              # libsharpyuv is a transitive of libwebp itself (webp 1.3+)
              cp -L /usr/lib64/libsharpyuv.so.* out/ 2>/dev/null || true
              ls -la out/
            '

      - name: Verify GLIBC compatibility (must be <= 2.28)
        run: |
          for SO in out/*.so.*; do
            ALL=$(objdump -T "$SO" | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sort -Vu || true)
            MAX=$(printf "%s" "$ALL" | tail -1)
            echo "=== $SO max GLIBC: $MAX ==="
            HIGHEST=$(printf "%s\nGLIBC_2.28\n" "$MAX" | sort -V | tail -1)
            if [ "$HIGHEST" != "GLIBC_2.28" ]; then
              echo "ERROR: $SO requires $MAX > GLIBC_2.28"
              exit 1
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86-64-legacy
          path: out/

  # ----- Linux aarch64 modern (Ubuntu 24.04 ARM) ----------------------------
  build_linux_aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Get Version Info
        run: |
          echo "TESSERACT_VERSION=$(mvn build-helper:parse-version org.apache.maven.plugins:maven-help-plugin:3.2.0:evaluate -Dexpression=tesseract.version.long -q -DforceStdout)" >> $GITHUB_ENV
          echo "LEPTONICA_VERSION=$(mvn build-helper:parse-version org.apache.maven.plugins:maven-help-plugin:3.2.0:evaluate -Dexpression=leptonica.version -q -DforceStdout)" >> $GITHUB_ENV

      - name: Install build dependencies
        run: |
          sudo apt-get update -q -y
          # libtiff-dev pulls in headers but not all its runtime codec
          # dependencies, so we install them explicitly. Without these,
          # leptonica/tesseract still link against libwebp/libzstd/etc.
          # but the runtime .so files are absent from /usr/lib at bundle
          # time and the verify NEEDED step (correctly) fails.
          sudo apt-get install -q -y \
            build-essential autoconf automake libtool pkg-config \
            libpng-dev libjpeg-dev libtiff-dev zlib1g-dev \
            libwebp-dev libzstd-dev liblzma-dev liblerc-dev libjbig-dev libdeflate-dev \
            curl

      - name: Build leptonica + tesseract
        run: |
          PREFIX="$RUNNER_TEMP/legerix-prefix"
          mkdir -p "$PREFIX"
          ./scripts/build-leptonica.sh "$LEPTONICA_VERSION" "$PREFIX"
          ./scripts/build-tesseract.sh "$TESSERACT_VERSION" "$PREFIX"
          mkdir -p out
          cp -L "$PREFIX/lib/libleptonica.so.6" out/
          cp -L "$PREFIX/lib/libtesseract.so.5" out/

      - name: Bundle transitive codec deps (jpeg, png, tiff, zlib)
        run: |
          # Same bundling as the x86_64 modern job, but from the aarch64 lib
          # directory. RPATH=$ORIGIN ensures runtime resolution from the
          # extracted-natives directory.
          LIB_DIR="/usr/lib/aarch64-linux-gnu"
          # Core image codec deps
          cp -L "$LIB_DIR"/libjpeg.so.*     out/ 2>/dev/null || true
          cp -L "$LIB_DIR"/libpng16.so.*    out/ 2>/dev/null || true
          cp -L "$LIB_DIR"/libtiff.so.*     out/ 2>/dev/null || true
          cp -L "$LIB_DIR"/libz.so.*        out/ 2>/dev/null || true
          # Transitive deps via libtiff
          cp -L "$LIB_DIR"/libwebp.so.*     out/ 2>/dev/null || true
          cp -L "$LIB_DIR"/libzstd.so.*     out/ 2>/dev/null || true
          cp -L "$LIB_DIR"/liblzma.so.*     out/ 2>/dev/null || true
          cp -L "$LIB_DIR"/libLerc.so.*     out/ 2>/dev/null || true
          cp -L "$LIB_DIR"/libjbig.so.*     out/ 2>/dev/null || true
          cp -L "$LIB_DIR"/libdeflate.so.*  out/ 2>/dev/null || true
          # libsharpyuv is a transitive of libwebp itself (webp 1.3+)
          cp -L "$LIB_DIR"/libsharpyuv.so.* out/ 2>/dev/null || true
          ls -la out/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64
          path: out/

  # ----- Linux aarch64 legacy (manylinux_2_28 container) --------------------
  build_linux_aarch64_legacy:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Get Version Info
        run: |
          echo "TESSERACT_VERSION=$(mvn build-helper:parse-version org.apache.maven.plugins:maven-help-plugin:3.2.0:evaluate -Dexpression=tesseract.version.long -q -DforceStdout)" >> $GITHUB_ENV
          echo "LEPTONICA_VERSION=$(mvn build-helper:parse-version org.apache.maven.plugins:maven-help-plugin:3.2.0:evaluate -Dexpression=leptonica.version -q -DforceStdout)" >> $GITHUB_ENV

      - name: Build in manylinux_2_28 (aarch64)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/io -w /io \
            -e TESSERACT_VERSION=${{ env.TESSERACT_VERSION }} \
            -e LEPTONICA_VERSION=${{ env.LEPTONICA_VERSION }} \
            quay.io/pypa/manylinux_2_28_aarch64 \
            /bin/bash -ec '
              yum install -y -q \
                libpng-devel libjpeg-turbo-devel libtiff-devel zlib-devel \
                libwebp-devel libzstd-devel xz-devel libdeflate-devel jbigkit-devel \
                autoconf automake libtool pkgconfig curl
              # libLerc not in CentOS 8 stream repos — libtiff on this
              # platform was built older without LERC support, so it is
              # not referenced as a NEEDED. Same for libsharpyuv (webp 1.3+
              # is too recent for manylinux_2_28 — the bundled webp is older).
              PREFIX=/io/_legacy-prefix
              mkdir -p "$PREFIX"
              ./scripts/build-leptonica.sh "$LEPTONICA_VERSION" "$PREFIX"
              ./scripts/build-tesseract.sh "$TESSERACT_VERSION" "$PREFIX"
              mkdir -p out
              cp -L "$PREFIX/lib/libleptonica.so.6" out/
              cp -L "$PREFIX/lib/libtesseract.so.5" out/
              # Bundle transitive codec deps from the aarch64 manylinux_2_28
              # container (CentOS 8 family, libs in /usr/lib64).
              cp -L /usr/lib64/libjpeg.so.*     out/ 2>/dev/null || true
              cp -L /usr/lib64/libpng16.so.*    out/ 2>/dev/null || true
              cp -L /usr/lib64/libtiff.so.*     out/ 2>/dev/null || true
              cp -L /usr/lib64/libz.so.*        out/ 2>/dev/null || true
              # Transitive deps via libtiff on manylinux_2_28
              cp -L /usr/lib64/libwebp.so.*     out/ 2>/dev/null || true
              cp -L /usr/lib64/libzstd.so.*     out/ 2>/dev/null || true
              cp -L /usr/lib64/liblzma.so.*     out/ 2>/dev/null || true
              cp -L /usr/lib64/libLerc.so.*     out/ 2>/dev/null || true
              cp -L /usr/lib64/libjbig.so.*     out/ 2>/dev/null || true
              cp -L /usr/lib64/libdeflate.so.*  out/ 2>/dev/null || true
              # libsharpyuv is a transitive of libwebp itself (webp 1.3+)
              cp -L /usr/lib64/libsharpyuv.so.* out/ 2>/dev/null || true
              ls -la out/
            '

      - name: Verify GLIBC compatibility (must be <= 2.28)
        run: |
          for SO in out/*.so.*; do
            ALL=$(objdump -T "$SO" | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sort -Vu || true)
            MAX=$(printf "%s" "$ALL" | tail -1)
            echo "=== $SO max GLIBC: $MAX ==="
            HIGHEST=$(printf "%s\nGLIBC_2.28\n" "$MAX" | sort -V | tail -1)
            if [ "$HIGHEST" != "GLIBC_2.28" ]; then
              echo "ERROR: $SO requires $MAX > GLIBC_2.28"
              exit 1
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64-legacy
          path: out/

  # ----- macOS x86_64 -------------------------------------------------------
  # Use macos-latest (same as Apertix) instead of pinning macos-13 explicitly:
  # the macos-13 free-tier queue is now saturated, while macos-latest gets
  # picked up immediately. Verified Intel-compatible by upstream Apertix.
  build_macos_x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Get Version Info
        run: |
          echo "TESSERACT_VERSION=$(mvn build-helper:parse-version org.apache.maven.plugins:maven-help-plugin:3.2.0:evaluate -Dexpression=tesseract.version.long -q -DforceStdout)" >> $GITHUB_ENV
          echo "LEPTONICA_VERSION=$(mvn build-helper:parse-version org.apache.maven.plugins:maven-help-plugin:3.2.0:evaluate -Dexpression=leptonica.version -q -DforceStdout)" >> $GITHUB_ENV

      - name: Install build dependencies
        run: |
          # webp/xz/zstd/jbigkit/lerc/libdeflate are pulled in by libtiff at
          # runtime — install them explicitly so they exist in $(brew --prefix)/lib
          # when we bundle them after the build.
          # webp/xz/zstd/jbigkit/libdeflate are pulled in by libtiff at
          # runtime — install them explicitly so they exist in $(brew --prefix)/lib
          # when we bundle them after the build.
          # Note: lerc is NOT in homebrew, so libtiff on macOS is compiled
          # without LERC support and never references libLerc as NEEDED.
          brew install autoconf automake libtool pkg-config \
                       libpng jpeg libtiff \
                       webp xz zstd jbigkit libdeflate

      - name: Build leptonica + tesseract
        run: |
          PREFIX="$RUNNER_TEMP/legerix-prefix"
          mkdir -p "$PREFIX"
          ./scripts/build-leptonica.sh "$LEPTONICA_VERSION" "$PREFIX"
          ./scripts/build-tesseract.sh "$TESSERACT_VERSION" "$PREFIX"
          mkdir -p out
          cp -L "$PREFIX/lib/libleptonica.6.dylib" out/
          cp -L "$PREFIX/lib/libtesseract.5.dylib" out/

      - name: Bundle transitive codec deps from homebrew
        run: |
          # Bundle the homebrew dylibs leptonica/tesseract linked against,
          # so users without those brew formulae installed can still load
          # Legerix. RPATH=@loader_path set at build time resolves these
          # at runtime from the same directory as libtesseract.
          # Note: libz ships natively on macOS at /usr/lib/libz.dylib so no
          # bundling needed for it.
          BREW_PREFIX="$(brew --prefix)"
          cp -L "$BREW_PREFIX"/lib/libjpeg.*.dylib       out/ 2>/dev/null || true
          cp -L "$BREW_PREFIX"/lib/libpng16.*.dylib      out/ 2>/dev/null || true
          cp -L "$BREW_PREFIX"/lib/libtiff.*.dylib       out/ 2>/dev/null || true
          # Transitive deps via libtiff on homebrew (webp, zstd, lzma,
          # Lerc, jbig, deflate). brew installs these as separate formulae
          # under different names; copy what's present.
          cp -L "$BREW_PREFIX"/lib/libwebp.*.dylib       out/ 2>/dev/null || true
          cp -L "$BREW_PREFIX"/lib/libzstd.*.dylib       out/ 2>/dev/null || true
          cp -L "$BREW_PREFIX"/lib/liblzma.*.dylib       out/ 2>/dev/null || true
          cp -L "$BREW_PREFIX"/lib/libLerc.*.dylib       out/ 2>/dev/null || true
          cp -L "$BREW_PREFIX"/lib/libjbig.*.dylib       out/ 2>/dev/null || true
          cp -L "$BREW_PREFIX"/lib/libdeflate.*.dylib    out/ 2>/dev/null || true
          # libsharpyuv is a transitive of libwebp itself (webp 1.3+)
          cp -L "$BREW_PREFIX"/lib/libsharpyuv.*.dylib   out/ 2>/dev/null || true
          ls -la out/

      - uses: actions/upload-artifact@v4
        with:
          name: darwin
          path: out/

  # ----- macOS aarch64 (Apple Silicon) --------------------------------------
  build_macos_aarch64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          architecture: aarch64

      - name: Get Version Info
        run: |
          echo "TESSERACT_VERSION=$(mvn build-helper:parse-version org.apache.maven.plugins:maven-help-plugin:3.2.0:evaluate -Dexpression=tesseract.version.long -q -DforceStdout)" >> $GITHUB_ENV
          echo "LEPTONICA_VERSION=$(mvn build-helper:parse-version org.apache.maven.plugins:maven-help-plugin:3.2.0:evaluate -Dexpression=leptonica.version -q -DforceStdout)" >> $GITHUB_ENV

      - name: Install build dependencies
        run: |
          # webp/xz/zstd/jbigkit/lerc/libdeflate are pulled in by libtiff at
          # runtime — install them explicitly so they exist in $(brew --prefix)/lib
          # when we bundle them after the build.
          # webp/xz/zstd/jbigkit/libdeflate are pulled in by libtiff at
          # runtime — install them explicitly so they exist in $(brew --prefix)/lib
          # when we bundle them after the build.
          # Note: lerc is NOT in homebrew, so libtiff on macOS is compiled
          # without LERC support and never references libLerc as NEEDED.
          brew install autoconf automake libtool pkg-config \
                       libpng jpeg libtiff \
                       webp xz zstd jbigkit libdeflate

      - name: Build leptonica + tesseract
        run: |
          PREFIX="$RUNNER_TEMP/legerix-prefix"
          mkdir -p "$PREFIX"
          ./scripts/build-leptonica.sh "$LEPTONICA_VERSION" "$PREFIX"
          ./scripts/build-tesseract.sh "$TESSERACT_VERSION" "$PREFIX"
          mkdir -p out
          cp -L "$PREFIX/lib/libleptonica.6.dylib" out/
          cp -L "$PREFIX/lib/libtesseract.5.dylib" out/

      - name: Bundle transitive codec deps from homebrew
        run: |
          # Same bundling as the x86_64 macOS job, but from the Apple
          # Silicon brew prefix. RPATH=@loader_path resolves at runtime.
          BREW_PREFIX="$(brew --prefix)"
          cp -L "$BREW_PREFIX"/lib/libjpeg.*.dylib       out/ 2>/dev/null || true
          cp -L "$BREW_PREFIX"/lib/libpng16.*.dylib      out/ 2>/dev/null || true
          cp -L "$BREW_PREFIX"/lib/libtiff.*.dylib       out/ 2>/dev/null || true
          # Transitive deps via libtiff on homebrew (webp, zstd, lzma,
          # Lerc, jbig, deflate). brew installs these as separate formulae
          # under different names; copy what's present.
          cp -L "$BREW_PREFIX"/lib/libwebp.*.dylib       out/ 2>/dev/null || true
          cp -L "$BREW_PREFIX"/lib/libzstd.*.dylib       out/ 2>/dev/null || true
          cp -L "$BREW_PREFIX"/lib/liblzma.*.dylib       out/ 2>/dev/null || true
          cp -L "$BREW_PREFIX"/lib/libLerc.*.dylib       out/ 2>/dev/null || true
          cp -L "$BREW_PREFIX"/lib/libjbig.*.dylib       out/ 2>/dev/null || true
          cp -L "$BREW_PREFIX"/lib/libdeflate.*.dylib    out/ 2>/dev/null || true
          # libsharpyuv is a transitive of libwebp itself (webp 1.3+)
          cp -L "$BREW_PREFIX"/lib/libsharpyuv.*.dylib   out/ 2>/dev/null || true
          ls -la out/

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-aarch64
          path: out/

  # ----- Windows x86_64 (vcpkg) ---------------------------------------------
  build_windows_x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Get Version Info
        shell: bash
        run: |
          echo "TESSERACT_VERSION=$(mvn build-helper:parse-version org.apache.maven.plugins:maven-help-plugin:3.2.0:evaluate -Dexpression=tesseract.version.long -q -DforceStdout)" >> $GITHUB_ENV
          echo "LEPTONICA_VERSION=$(mvn build-helper:parse-version org.apache.maven.plugins:maven-help-plugin:3.2.0:evaluate -Dexpression=leptonica.version -q -DforceStdout)" >> $GITHUB_ENV

      # vcpkg builds every transitive dep from source (openssl, libcurl,
      # libpng, libjpeg-turbo, libtiff, leptonica, tesseract...) — ~45 min
      # cold. The installed/ + packages/ + buildtrees/ trees can be cached
      # by GitHub Actions, dropping subsequent runs to ~2 min. Cache key
      # depends on tesseract+leptonica versions so a version bump invalidates.
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/installed
            C:/vcpkg/packages
            C:/vcpkg/buildtrees
            C:/vcpkg/downloads
          key: vcpkg-windows-tesseract-${{ env.TESSERACT_VERSION }}-leptonica-${{ env.LEPTONICA_VERSION }}
          restore-keys: |
            vcpkg-windows-

      - name: Install vcpkg dependencies
        shell: bash
        run: |
          vcpkg install tesseract:x64-windows leptonica:x64-windows

      - name: Stage native artifacts
        shell: bash
        run: |
          # vcpkg-built tesseract.dll has transitive runtime dependencies
          # on ~10 other DLLs (libpng, libtiff, libjpeg-turbo, libwebp,
          # openjp2, zlib, libcurl, libarchive, etc.). Copy *every* DLL
          # from the vcpkg installed bin/ so the runtime loader can
          # resolve them. Without these, end users hit UnsatisfiedLinkError
          # the first time tesseract.dll tries to load a codec dep.
          mkdir -p out
          VCPKG_BIN="/c/vcpkg/installed/x64-windows/bin"
          cp "$VCPKG_BIN"/*.dll out/
          ls -la out/

      - uses: actions/upload-artifact@v4
        with:
          name: win32-x86-64
          path: out/

  # ----- Final job: assemble fat jar (no Maven Central deploy) --------------
  build_dist:
    needs:
      - build_linux_x64
      - build_linux_x64_legacy
      - build_linux_aarch64
      - build_linux_aarch64_legacy
      - build_macos_x64
      - build_macos_aarch64
      - build_windows_x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Get Version Info
        run: |
          echo "POM_VERSION=$(mvn build-helper:parse-version org.apache.maven.plugins:maven-help-plugin:3.2.0:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV

      - name: Download all native artifacts
        uses: actions/download-artifact@v4

      - name: Stage natives into src/main/resources
        run: |
          rm -rf src/main/resources/linux-x86-64 \
                 src/main/resources/linux-x86-64-legacy \
                 src/main/resources/linux-aarch64 \
                 src/main/resources/linux-aarch64-legacy \
                 src/main/resources/darwin \
                 src/main/resources/darwin-aarch64 \
                 src/main/resources/win32-x86-64
          mkdir -p src/main/resources/linux-x86-64 \
                   src/main/resources/linux-x86-64-legacy \
                   src/main/resources/linux-aarch64 \
                   src/main/resources/linux-aarch64-legacy \
                   src/main/resources/darwin \
                   src/main/resources/darwin-aarch64 \
                   src/main/resources/win32-x86-64
          cp linux-x86-64/*           src/main/resources/linux-x86-64/
          cp linux-x86-64-legacy/*    src/main/resources/linux-x86-64-legacy/
          cp linux-aarch64/*          src/main/resources/linux-aarch64/
          cp linux-aarch64-legacy/*   src/main/resources/linux-aarch64-legacy/
          cp darwin/*                 src/main/resources/darwin/
          cp darwin-aarch64/*         src/main/resources/darwin-aarch64/
          cp win32-x86-64/*           src/main/resources/win32-x86-64/

      - name: Fetch traineddata (5 bundled languages)
        run: bash ./scripts/fetch-traineddata.sh src/main/resources/tessdata

      - name: Verify natives + traineddata
        run: |
          echo "=== Natives staged ==="
          find src/main/resources -type f \( -name "*.so*" -o -name "*.dylib" -o -name "*.dll" \) | sort
          # Each Linux/macOS tier must ship at least the core 2 libs
          # (leptonica + tesseract). Transitive codec deps (libjpeg, libpng,
          # libtiff, libz) are bundled on top when present on the build
          # system, so total per tier is >= 2 (not a strict count).
          # Windows: variable (every vcpkg DLL), so just assert >= 2.
          for TIER in linux-x86-64 linux-x86-64-legacy linux-aarch64 linux-aarch64-legacy darwin darwin-aarch64; do
            COUNT=$(find "src/main/resources/$TIER" -type f \( -name "*.so*" -o -name "*.dylib" \) | wc -l)
            if [ "$COUNT" -lt 2 ]; then
              echo "ERROR: $TIER has only $COUNT native(s), expected at least 2 (leptonica + tesseract)"
              exit 1
            fi
            echo "OK: $TIER has $COUNT natives"
          done
          WIN_COUNT=$(find src/main/resources/win32-x86-64 -type f -name "*.dll" | wc -l)
          if [ "$WIN_COUNT" -lt 2 ]; then
            echo "ERROR: expected at least 2 Windows DLLs (tesseract+leptonica), found $WIN_COUNT"
            exit 1
          fi
          for lang in eng fra spa chi_sim hin; do
            test -f "src/main/resources/tessdata/${lang}.traineddata" \
              || { echo "ERROR: missing tessdata/${lang}.traineddata"; exit 1; }
          done
          echo "OK: all 6 Unix tiers + $WIN_COUNT Windows DLLs + 5 traineddata files"

      - name: Verify NEEDED entries (Linux tiers only)
        run: |
          # Sanity check: every NEEDED entry in Linux .so files must either
          # be a standard glibc/musl lib OR be present in the same tier
          # directory. Catches future regressions where build deps drift
          # and an unexpected lib slips into the binary without being
          # bundled.
          set +e
          STANDARD_LIBS="libc.so libdl.so libm.so libpthread.so librt.so libstdc\\+\\+.so libgcc_s.so ld-linux"
          OVERALL_OK=true
          for TIER_DIR in src/main/resources/linux-*; do
            TIER=$(basename "$TIER_DIR")
            echo "=== $TIER ==="
            for SO in "$TIER_DIR"/*.so*; do
              echo "--- $(basename $SO) ---"
              NEEDED=$(readelf -d "$SO" 2>/dev/null | grep NEEDED | grep -oE '\[[^]]+\]' | tr -d '[]')
              for LIB in $NEEDED; do
                # Check if standard glibc lib
                IS_STD=false
                for STD in $STANDARD_LIBS; do
                  if echo "$LIB" | grep -qE "^${STD}"; then
                    IS_STD=true
                    break
                  fi
                done
                if [ "$IS_STD" = true ]; then
                  echo "  STD     $LIB"
                  continue
                fi
                # Check if present in same tier
                if [ -f "$TIER_DIR/$LIB" ]; then
                  echo "  BUNDLED $LIB"
                else
                  echo "  MISSING $LIB (not standard and not bundled)"
                  OVERALL_OK=false
                fi
              done
            done
          done
          if [ "$OVERALL_OK" != true ]; then
            echo ""
            echo "ERROR: at least one Linux native has an unresolved NEEDED entry."
            echo "Either bundle the missing lib in the corresponding tier, or"
            echo "add it to the STANDARD_LIBS allowlist if it is a true OS-level dep."
            exit 1
          fi
          echo "OK: all Linux NEEDED entries are either standard or bundled."

      - name: Build and test
        run: mvn -B install

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: target/legerix*

  # ----- GitHub release upload ----------------------------------------------
  # Runs on every workflow trigger (tag push or manual dispatch). The release
  # tag is derived from the pom version (e.g. "v5.5.0-1"). If the release
  # already exists, assets are uploaded with --clobber so re-runs overwrite
  # the previous artifacts in place rather than creating a duplicate release.
  # Same pattern as Apertix.
  release:
    needs: build_dist
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Get Version Info
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4

      - name: Prepare release assets
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p release-assets

          # Fat jar (contains every platform's natives + tessdata).
          cp dist/legerix-${VERSION}.jar release-assets/

          # Raw natives, one file per platform per lib, suffixed with the
          # platform tag in the basename. Same convention as Apertix.
          # Linux .so
          cp linux-x86-64/libtesseract.so.5         release-assets/libtesseract.so.5-linux-x86-64
          cp linux-x86-64/libleptonica.so.6         release-assets/libleptonica.so.6-linux-x86-64
          cp linux-x86-64-legacy/libtesseract.so.5  release-assets/libtesseract.so.5-linux-x86-64-legacy
          cp linux-x86-64-legacy/libleptonica.so.6  release-assets/libleptonica.so.6-linux-x86-64-legacy
          cp linux-aarch64/libtesseract.so.5        release-assets/libtesseract.so.5-linux-aarch64
          cp linux-aarch64/libleptonica.so.6        release-assets/libleptonica.so.6-linux-aarch64
          cp linux-aarch64-legacy/libtesseract.so.5 release-assets/libtesseract.so.5-linux-aarch64-legacy
          cp linux-aarch64-legacy/libleptonica.so.6 release-assets/libleptonica.so.6-linux-aarch64-legacy
          # macOS .dylib
          cp darwin/libtesseract.5.dylib            release-assets/libtesseract.5-darwin.dylib
          cp darwin/libleptonica.6.dylib            release-assets/libleptonica.6-darwin.dylib
          cp darwin-aarch64/libtesseract.5.dylib    release-assets/libtesseract.5-darwin-aarch64.dylib
          cp darwin-aarch64/libleptonica.6.dylib    release-assets/libleptonica.6-darwin-aarch64.dylib
          # Windows: bundle every DLL (tesseract + leptonica + ~10 transitive
          # codec/runtime deps from vcpkg) as a single zip asset. Individual
          # DLLs are no longer uploaded because end consumers need the full
          # set or none at all (any missing transitive triggers
          # UnsatisfiedLinkError at runtime).
          ( cd win32-x86-64 && zip -r ../release-assets/legerix-win-x86-64.zip . -x ".gitkeep" )

          ls -lh release-assets/

      - name: Create release if needed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          if ! gh release view "$TAG" > /dev/null 2>&1; then
            gh release create "$TAG" \
              --title "Legerix ${{ steps.version.outputs.VERSION }}" \
              --notes "Tesseract + Leptonica natives bundled for Linux (x86_64 + aarch64, modern + legacy glibc 2.28), macOS (x86_64 + aarch64) and Windows (x86_64)."
          fi

      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          gh release upload "$TAG" release-assets/* --clobber
